<!DOCTYPE html>
<!-- ChatBot by Nambi — Leviathan (Levi) — Sign up -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | Leviathan</title>
    <link rel="icon" type="image/png" sizes="512x512" href="images/leviathan-logo.png" />
    <link rel="shortcut icon" type="image/png" href="images/leviathan-logo.png" />
    <link rel="apple-touch-icon" href="images/leviathan-logo.png" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@32,400,0,0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="auth-page">
    <a href="index.html" class="auth-back-btn material-symbols-rounded" title="Back to chat">arrow_back</a>

    <div class="bg-animation">
      <div class="stars stars-small"></div>
      <div class="stars stars-medium"></div>
      <div class="stars stars-large"></div>
    </div>

    <div class="watermark-logo" aria-hidden="true">
      <img src="images/leviathan-logo.png" alt="" />
    </div>

    <main class="auth-shell">
      <div class="auth-card">
        <img class="auth-logo" src="images/leviathan-logo.png" alt="Leviathan" />
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Sign up to start chatting with Levi.</p>

        <div id="auth-message" class="auth-message" hidden></div>

        <form id="signup-form" class="auth-form" novalidate>
          <label class="auth-field">
            <span>Email</span>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required />
          </label>

          <label class="auth-field">
            <span>Password</span>
            <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password" required minlength="6" />
          </label>

          <label class="auth-field">
            <span>Confirm password</span>
            <input type="password" id="signup-confirm-password" placeholder="••••••••" autocomplete="new-password" required minlength="6" />
          </label>

          <button type="submit" id="signup-submit-btn" class="auth-submit-btn">Sign up</button>
        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </p>
      </div>
    </main>

    <script src="supabase-client.js"></script>
    <script>
      const form = document.getElementById("signup-form");
      const emailInput = document.getElementById("signup-email");
      const passwordInput = document.getElementById("signup-password");
      const confirmInput = document.getElementById("signup-confirm-password");
      const submitBtn = document.getElementById("signup-submit-btn");
      const messageBox = document.getElementById("auth-message");

      const showMessage = (text, isError = true) => {
        messageBox.textContent = text;
        messageBox.hidden = false;
        messageBox.classList.toggle("auth-message-error", isError);
        messageBox.classList.toggle("auth-message-success", !isError);
      };

      // Already logged in? Skip straight past the signup form.
      (async () => {
        const { data } = await supabaseClient.auth.getSession();
        if (data.session) window.location.href = "index.html";
      })();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (passwordInput.value !== confirmInput.value) {
          showMessage("Passwords don't match.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Signing up...";
        messageBox.hidden = true;

        const { data, error } = await supabaseClient.auth.signUp({
          email: emailInput.value.trim(),
          password: passwordInput.value,
        });

        if (error) {
          showMessage(error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign up";
          return;
        }

        // Depending on your Supabase project's email-confirmation setting,
        // signUp either returns a live session immediately, or requires the
        // user to click a confirmation link first.
        if (data.session) {
          window.location.href = "index.html";
          return;
        }

        showMessage("Account created! Check your email to confirm before logging in.", false);
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign up";
        form.reset();
      });
    </script>
  </body>
</html>
